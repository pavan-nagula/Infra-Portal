apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-portal-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: infra-portal
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra-portal

  source:
    repoURL: https://github.com/cubic-aws/infra-portal-python.git
    targetRevision: develop
    path: helm/infra-portal
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: infra-portal-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
