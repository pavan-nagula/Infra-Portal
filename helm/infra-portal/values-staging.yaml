# ============================
# Staging environment overrides
# ============================

namespace: infra-portal-staging

backend:
  replicaCount: 2
  profile: staging
  securityEnabled: "true"
  corsAllowedOrigins: "https://infra-portal-staging.cubic.com"
  terminationGracePeriodSeconds: 60

  image:
    tag: ""  # Set by ArgoCD image updater or CI

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

ui:
  replicaCount: 2

  image:
    tag: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  host: infra-portal-staging.cubic.com
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: ""  # Set your staging ACM cert ARN
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
