name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: cubic-aws.dkr.ecr.us-west-2.amazonaws.com

jobs:
  # ──────────── Backend ────────────
  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pytest pytest-cov

      - name: Lint (ruff + black)
        run: |
          ruff check app/
          black --check app/

      - name: Tests
        run: pytest -q --cov=app --cov-report=term-missing

  # ──────────── Frontend ────────────
  frontend:
    name: Frontend lint & test & build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ──────────── Docker images ────────────
  docker:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=prod-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "tag=staging-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/infra-portal-backend:${{ steps.tag.outputs.tag }} ./backend
          docker push $ECR_REGISTRY/infra-portal-backend:${{ steps.tag.outputs.tag }}

      - name: Build & push frontend
        run: |
          docker build -t $ECR_REGISTRY/infra-portal-ui:${{ steps.tag.outputs.tag }} ./frontend
          docker push $ECR_REGISTRY/infra-portal-ui:${{ steps.tag.outputs.tag }}

  # ──────────── Helm lint ────────────
  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - run: |
          helm lint helm/infra-portal -f helm/infra-portal/values.yaml
          helm lint helm/infra-portal -f helm/infra-portal/values.yaml -f helm/infra-portal/values-dev.yaml
          helm lint helm/infra-portal -f helm/infra-portal/values.yaml -f helm/infra-portal/values-staging.yaml
          helm lint helm/infra-portal -f helm/infra-portal/values.yaml -f helm/infra-portal/values-prod.yaml
      - name: Helm template (smoke test)
        run: |
          helm template infra-portal helm/infra-portal -f helm/infra-portal/values.yaml > /dev/null
