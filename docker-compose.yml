services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: infra-portal-backend:latest
    container_name: infra-portal-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      ENV: ${ENV:-development}
      SECURITY_ENABLED: ${SECURITY_ENABLED:-false}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/actuator/health/liveness',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: infra-portal-ui:latest
    container_name: infra-portal-ui
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
